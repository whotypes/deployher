map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream deployher_edge {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name deployher.com www.deployher.com dash.deployher.com api.deployher.com *.deployher.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name deployher.com www.deployher.com dash.deployher.com api.deployher.com *.deployher.com;

  ssl_certificate     /etc/letsencrypt/live/deployher.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/deployher.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  client_max_body_size 512m;

  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;

  location ~ ^/(d/|preview/|deployments/[^/]+/(log/stream|runtime-log/stream)) {
    proxy_pass http://deployher_edge;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  location / {
    proxy_pass http://deployher_edge;
    proxy_read_timeout 3600s;
  }
}
