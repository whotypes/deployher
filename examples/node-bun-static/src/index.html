<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>node-bun-static</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f4f5;
        --surface: #fff;
        --text: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --focus: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --surface: #18181b;
          --text: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
          --accent: #3b82f6;
          --accent-hover: #60a5fa;
          --focus: #93c5fd;
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 1.5rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      header h1 {
        margin: 0 0 0.35rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        max-width: 40rem;
      }
      main {
        padding: 1.5rem 1.25rem 2.5rem;
        max-width: 42rem;
        margin: 0 auto;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.65rem;
        margin-bottom: 1rem;
      }
      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.75rem;
        text-align: center;
      }
      .stat strong {
        display: block;
        font-size: 1.35rem;
        font-weight: 700;
      }
      .stat span {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .filters {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin-bottom: 1rem;
      }
      .search-row input {
        width: 100%;
        font: inherit;
        padding: 0.5rem 0.65rem;
        border-radius: 0.35rem;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
      }
      .search-row input:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .chip {
        font: inherit;
        cursor: pointer;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.8rem;
      }
      .chip[aria-pressed="true"] {
        border-color: var(--accent);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, var(--surface));
      }
      .chip:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 1rem 1.1rem;
      }
      section h2 {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
      }
      .hint {
        font-size: 0.8rem;
        color: var(--muted);
        margin: 0 0 0.75rem;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      li:last-child {
        border-bottom: none;
      }
      .name {
        font-weight: 500;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .id {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        color: var(--muted);
      }
      .status {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0.2rem 0.45rem;
        border-radius: 0.25rem;
      }
      .status-ready {
        background: color-mix(in srgb, #22c55e 18%, transparent);
        color: #16a34a;
      }
      @media (prefers-color-scheme: dark) {
        .status-ready {
          color: #4ade80;
        }
      }
      .status-building {
        background: color-mix(in srgb, var(--accent) 22%, transparent);
        color: var(--accent);
      }
      .status-failed {
        background: color-mix(in srgb, #ef4444 18%, transparent);
        color: #dc2626;
      }
      @media (prefers-color-scheme: dark) {
        .status-failed {
          color: #f87171;
        }
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-top: 1rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
      }
      .pager {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .pager span {
        font-size: 0.85rem;
        color: var(--muted);
        min-width: 6.5rem;
        text-align: center;
      }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        padding: 0.4rem 0.75rem;
        border-radius: 0.35rem;
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }
      button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .primary:hover:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>node-bun-static</h1>
      <p>
        Static output built with bun on Deployher. Explore filters, search, and pagination entirely in the
        browser—no backend required. Outside of text fields, use ← → to flip pages.
      </p>
    </header>
    <main>
      <div class="stats" aria-label="Counts for filtered deployments">
        <div class="stat">
          <strong id="stat-ready">0</strong><span>Ready</span>
        </div>
        <div class="stat">
          <strong id="stat-building">0</strong><span>Building</span>
        </div>
        <div class="stat">
          <strong id="stat-failed">0</strong><span>Failed</span>
        </div>
      </div>
      <div class="filters">
        <div class="search-row">
          <label for="search" class="sr-only">Filter by name or deployment id</label>
          <input
            type="search"
            id="search"
            placeholder="Filter by name or deployment id…"
            autocomplete="off"
            aria-label="Filter by name or deployment id"
          />
        </div>
        <div class="chips" role="group" aria-label="Filter by status">
          <button type="button" class="chip" data-status="all" aria-pressed="true">All</button>
          <button type="button" class="chip" data-status="ready" aria-pressed="false">Ready</button>
          <button type="button" class="chip" data-status="building" aria-pressed="false">Building</button>
          <button type="button" class="chip" data-status="failed" aria-pressed="false">Failed</button>
        </div>
      </div>
      <section aria-labelledby="deployments-heading">
        <h2 id="deployments-heading">Recent deployments</h2>
        <p class="hint" id="filter-hint" aria-live="polite"></p>
        <ul id="deployment-list"></ul>
        <div class="toolbar">
          <div class="pager">
            <button type="button" id="prev-page" aria-label="Previous page">Previous</button>
            <span id="page-label" aria-live="polite">Page 1 of 1</span>
            <button type="button" id="next-page" aria-label="Next page">Next</button>
          </div>
          <button type="button" class="primary" id="refresh-demo" aria-label="Shuffle demo data">
            Shuffle demo
          </button>
        </div>
      </section>
    </main>
    <script>
      const PAGE_SIZE = 5;
      const rawDeployments = [
        { name: "marketing-site", status: "ready", id: "dpl_8k2m" },
        { name: "api-worker", status: "building", id: "dpl_9x1q" },
        { name: "docs", status: "ready", id: "dpl_3n7p" },
        { name: "preview-app", status: "failed", id: "dpl_2h4w" },
        { name: "dashboard", status: "ready", id: "dpl_6r9t" },
        { name: "blog", status: "ready", id: "dpl_1a5c" },
        { name: "auth-service", status: "building", id: "dpl_7b3d" },
        { name: "cdn-assets", status: "ready", id: "dpl_4e8f" },
        { name: "experiments", status: "failed", id: "dpl_0z6g" },
        { name: "status-page", status: "ready", id: "dpl_5y2h" },
        { name: "checkout-ui", status: "ready", id: "dpl_9j1k" },
        { name: "admin", status: "building", id: "dpl_3l4m" }
      ];

      const listEl = document.getElementById("deployment-list");
      const pageLabelEl = document.getElementById("page-label");
      const filterHintEl = document.getElementById("filter-hint");
      const prevBtn = document.getElementById("prev-page");
      const nextBtn = document.getElementById("next-page");
      const refreshBtn = document.getElementById("refresh-demo");
      const searchEl = document.getElementById("search");
      const statReadyEl = document.getElementById("stat-ready");
      const statBuildingEl = document.getElementById("stat-building");
      const statFailedEl = document.getElementById("stat-failed");

      let deployments = [...rawDeployments];
      let page = 1;
      let statusFilter = "all";

      const statusClass = (status) => {
        if (status === "ready") return "status-ready";
        if (status === "building") return "status-building";
        return "status-failed";
      };

      const getFiltered = () => {
        const q = searchEl.value.trim().toLowerCase();
        return deployments.filter((d) => {
          if (statusFilter !== "all" && d.status !== statusFilter) return false;
          if (!q) return true;
          return d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q);
        });
      };

      const totalPages = (list) => Math.max(1, Math.ceil(list.length / PAGE_SIZE));

      const syncChips = () => {
        document.querySelectorAll(".chip").forEach((btn) => {
          const on = btn.getAttribute("data-status") === statusFilter;
          btn.setAttribute("aria-pressed", on ? "true" : "false");
        });
      };

      const render = () => {
        const filtered = getFiltered();
        const tp = totalPages(filtered);
        page = Math.min(page, tp);
        const start = (page - 1) * PAGE_SIZE;
        const slice = filtered.slice(start, start + PAGE_SIZE);
        let r = 0;
        let b = 0;
        let f = 0;
        for (const d of filtered) {
          if (d.status === "ready") r += 1;
          else if (d.status === "building") b += 1;
          else f += 1;
        }
        statReadyEl.textContent = String(r);
        statBuildingEl.textContent = String(b);
        statFailedEl.textContent = String(f);
        filterHintEl.textContent =
          filtered.length === deployments.length
            ? `Showing all ${deployments.length} mock deployments.`
            : `Showing ${filtered.length} of ${deployments.length} deployments.`;
        listEl.innerHTML = "";
        if (slice.length === 0) {
          const li = document.createElement("li");
          li.textContent = "No deployments match the current filters.";
          listEl.appendChild(li);
        } else {
          for (const d of slice) {
            const li = document.createElement("li");
            li.innerHTML = `<span class="name"></span><span class="meta"><span class="id"></span><span aria-label="Status"></span></span>`;
            li.querySelector(".name").textContent = d.name;
            li.querySelector(".id").textContent = d.id;
            const badge = li.querySelector(".status");
            badge.textContent = d.status;
            badge.classList.add("status", statusClass(d.status));
            listEl.appendChild(li);
          }
        }
        pageLabelEl.textContent = `Page ${page} of ${tp}`;
        prevBtn.disabled = page <= 1;
        nextBtn.disabled = page >= tp;
        syncChips();
      };

      const handlePrevClick = () => {
        page = Math.max(1, page - 1);
        render();
      };

      const handleNextClick = () => {
        page = Math.min(totalPages(getFiltered()), page + 1);
        render();
      };

      const handleRefreshClick = () => {
        deployments = [...deployments].sort(() => Math.random() - 0.5);
        page = 1;
        render();
      };

      const handleChipClick = (e) => {
        const btn = e.target.closest(".chip");
        if (!btn) return;
        statusFilter = btn.getAttribute("data-status") || "all";
        page = 1;
        render();
      };

      prevBtn.addEventListener("click", handlePrevClick);
      nextBtn.addEventListener("click", handleNextClick);
      refreshBtn.addEventListener("click", handleRefreshClick);
      searchEl.addEventListener("input", () => {
        page = 1;
        render();
      });
      document.querySelector(".chips").addEventListener("click", handleChipClick);
      document.addEventListener("keydown", (e) => {
        const t = e.target;
        const tag = t && t.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        if (e.key === "ArrowLeft") handlePrevClick();
        if (e.key === "ArrowRight") handleNextClick();
      });
      render();
    </script>
  </body>
</html>
