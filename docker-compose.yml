services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    container_name: pdploy-app
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SKIP_CLIENT_BUILD: "1"
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_WORKERS: "0"
      RUNNER_PREVIEW_ENABLED: ${RUNNER_PREVIEW_ENABLED:-0}
      RUNNER_URL: ${RUNNER_URL:-}
    ports:
      - "3000:3000"

  deployment-worker:
    build:
      context: .
      dockerfile: docker/build-worker.Dockerfile
    user: "0:0"
    restart: unless-stopped
    deploy:
      replicas: ${BUILD_WORKERS:-4}
    depends_on:
      node-build-image:
        condition: service_completed_successfully
      bun-build-image:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_NODE_IMAGE: ${BUILD_NODE_BUILDER_IMAGE:-pdploy-node-build-image:latest}
      BUILD_BUN_IMAGE: ${BUILD_BUN_BUILDER_IMAGE:-pdploy-bun-build-image:latest}
      BUILD_RECLAIM_IDLE_MS: ${BUILD_RECLAIM_IDLE_MS:-5000}
      BUILD_ACCOUNT_MAX_CONCURRENT: ${BUILD_ACCOUNT_MAX_CONCURRENT:-4}
      BUILD_WORKDIR: /tmp/pdploy-builds
      DEV_DOMAIN: localhost
      DEV_PROTOCOL: http
      TRUSTED_LOCAL_DOCKER: ${TRUSTED_LOCAL_DOCKER:-1}
      RUNNER_PREVIEW_ENABLED: ${RUNNER_PREVIEW_ENABLED:-0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/pdploy-builds:/tmp/pdploy-builds

  node-build-image:
    build:
      context: .
      dockerfile: docker/node-builder.Dockerfile
      args:
        NEXUS_REGISTRY: ${NEXUS_REGISTRY:-localhost:8082}
    image: pdploy-node-build-image:latest
    container_name: pdploy-node-build-image
    command: ["sh", "-c", "echo node builder image ready"]
    restart: "no"

  bun-build-image:
    build:
      context: .
      dockerfile: docker/bun-builder.Dockerfile
      args:
        NEXUS_REGISTRY: ${NEXUS_REGISTRY:-localhost:8082}
    image: pdploy-bun-build-image:latest
    container_name: pdploy-bun-build-image
    command: ["sh", "-c", "echo bun builder image ready"]
    restart: "no"

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    env_file:
      - ./infra/.garage.env
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # Web UI
      - "3903:3903" # Admin
    volumes:
      - ./infra/garage.dev.toml:/etc/garage.toml
      - ./infra/meta:/var/lib/garage/meta
      - ./infra/data:/var/lib/garage/data

  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - nexus_data:/nexus-data

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: placeholder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d placeholder"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nexus_data:
