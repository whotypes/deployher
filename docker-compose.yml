services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    container_name: pdploy-app
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SKIP_CLIENT_BUILD: "1"
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_WORKERS: "0"
    ports:
      - "3000:3000"

  build-worker:
    build:
      context: .
      dockerfile: docker/build-worker.Dockerfile
    container_name: pdploy-build-worker
    user: "0:0"
    restart: unless-stopped
    depends_on:
      node-builder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_NODE_IMAGE: pdploy-node-builder:latest
      BUILD_WORKDIR: /tmp/pdploy-builds
      DEV_DOMAIN: localhost
      DEV_PROTOCOL: http
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/pdploy-builds:/tmp/pdploy-builds

  node-builder:
    build:
      context: .
      dockerfile: docker/node-builder.Dockerfile
    image: pdploy-node-builder:latest
    container_name: pdploy-node-builder
    command: ["sh", "-c", "echo node builder image ready"]
    restart: "no"

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    env_file:
      - ./infra/.garage.env
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # Web UI
      - "3903:3903" # Admin
    volumes:
      - ./infra/garage.dev.toml:/etc/garage.toml
      - ./infra/meta:/var/lib/garage/meta
      - ./infra/data:/var/lib/garage/data

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: placeholder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d placeholder"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
