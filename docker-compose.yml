services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    container_name: deployher-app
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
      preview-runner:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SKIP_CLIENT_BUILD: "1"
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_WORKERS: "0"
      RUNNER_PREVIEW_ENABLED: "1"
      RUNNER_URL: http://preview-runner:8787
    ports:
      - "3000:3000"

  preview-runner:
    build:
      context: .
      dockerfile: docker/preview-runner.Dockerfile
    container_name: deployher-preview-runner
    restart: unless-stopped
    user: "0:0"
    depends_on:
      garage:
        condition: service_started
      redis:
        condition: service_healthy
      nexus:
        condition: service_started
    env_file:
      - .env
    environment:
      PORT: "8787"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      RUNNER_DOCKER_NETWORK: deployher_default
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      PREVIEW_TTL_MS: ${PREVIEW_TTL_MS:-1800000}
      PREVIEW_MEMORY_BYTES: ${PREVIEW_MEMORY_BYTES:-1073741824}
      PREVIEW_NANO_CPUS: ${PREVIEW_NANO_CPUS:-1}
      # Docker Engine (via mounted socket) resolves this on the host, not the compose network — use a
      # published registry address (not the service name "nexus"). Override if the daemon cannot reach loopback.
      PREVIEW_RUNTIME_REGISTRY: ${PREVIEW_RUNTIME_DOCKER_DAEMON_REGISTRY:-127.0.0.1:8082}
      PREVIEW_RUNTIME_DOCKER_REPO: ${PREVIEW_RUNTIME_DOCKER_REPO:-docker-hosted}
      PREVIEW_RUNTIME_IMAGE_NAME: ${PREVIEW_RUNTIME_IMAGE_NAME:-deployher-preview-runtime}
      PREVIEW_RUNNER_IMAGE_GC_INTERVAL_MS: ${PREVIEW_RUNNER_IMAGE_GC_INTERVAL_MS:-900000}
      PREVIEW_RUNNER_IMAGE_MAX_AGE_MS: ${PREVIEW_RUNNER_IMAGE_MAX_AGE_MS:-604800000}
      # Ask the app to prewarm images + start preview containers for each project current server deployment (retries if app is still booting).
      PREVIEW_REHYDRATE_TRIGGER_URL: http://app:3000/internal/trigger-preview-rehydrate
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8787:8787"

  deployment-worker:
    build:
      context: .
      dockerfile: docker/build-worker.Dockerfile
    user: "0:0"
    restart: unless-stopped
    deploy:
      replicas: ${BUILD_WORKERS:-4}
    depends_on:
      node-build-image:
        condition: service_completed_successfully
      bun-build-image:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
      nexus:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/placeholder
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      BUILD_WORKDIR: /tmp/deployher-builds
      DEV_DOMAIN: localhost
      DEV_PROTOCOL: http
      RUNNER_PREVIEW_ENABLED: "1"
      RUNNER_URL: http://preview-runner:8787
      PREVIEW_RUNTIME_REGISTRY: ${PREVIEW_RUNTIME_DOCKER_DAEMON_REGISTRY:-127.0.0.1:8082}
      PREVIEW_RUNTIME_DOCKER_REPO: ${PREVIEW_RUNTIME_DOCKER_REPO:-docker-hosted}
      PREVIEW_RUNTIME_IMAGE_NAME: ${PREVIEW_RUNTIME_IMAGE_NAME:-deployher-preview-runtime}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/deployher-builds:/tmp/deployher-builds

  node-build-image:
    build:
      context: .
      dockerfile: docker/node-builder.Dockerfile
      args:
        NEXUS_REGISTRY: ${NEXUS_REGISTRY:-localhost:8082}
    image: deployher-node-build-image:latest
    container_name: deployher-node-build-image
    command: ["sh", "-c", "echo node builder image ready"]
    restart: "no"

  bun-build-image:
    build:
      context: .
      dockerfile: docker/bun-builder.Dockerfile
      args:
        NEXUS_REGISTRY: ${NEXUS_REGISTRY:-localhost:8082}
    image: deployher-bun-build-image:latest
    container_name: deployher-bun-build-image
    command: ["sh", "-c", "echo bun builder image ready"]
    restart: "no"

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    env_file:
      - ./infra/.garage.env
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # Web UI
      - "3903:3903" # Admin
    volumes:
      - ./infra/garage.dev.toml:/etc/garage.toml
      - ./infra/meta:/var/lib/garage/meta
      - ./infra/data:/var/lib/garage/data

  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - nexus_data:/nexus-data

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: placeholder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d placeholder"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

networks:
  default:
    name: deployher_default

volumes:
  postgres_data:
  nexus_data:
